<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gaming Website</title>
<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  overflow:hidden;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
  background-size: 400% 400%;
  animation: bg 10s infinite;
}
@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
button{padding:10px;margin:10px;cursor:pointer}
canvas{background:black}
.hidden{display:none}
</style>
</head>
<body>

<h1>🎮 Gaming Website</h1>
<button onclick="show('car')">🚗 Car Racing</button>
<button onclick="show('snake')">🐍 Snake</button>

<div id="car" class="hidden">
<h2>Car Racing Game</h2>
<canvas id="carGame" width="300" height="400"></canvas>
</div>

<div id="snake" class="hidden">
<h2>Snake Game</h2>
<canvas id="snakeGame" width="300" height="300"></canvas>
</div>

<script>
function show(g){
 document.getElementById('car').classList.add('hidden');
 document.getElementById('snake').classList.add('hidden');
 document.getElementById(g).classList.remove('hidden');
}

// CAR GAME (with lanes + better graphics)
const c = document.getElementById('carGame');
const ctx = c.getContext('2d');

let carX = 140;
let speed = 5;
let keys = { left:false, right:false };
let obstacles = [{x:100,y:-40},{x:180,y:-200}];
let score = 0;

function drawRoad(){
  // road
  ctx.fillStyle = '#222';
  ctx.fillRect(0,0,300,400);

  // side grass
  ctx.fillStyle = '#14532d';
  ctx.fillRect(0,0,40,400);
  ctx.fillRect(260,0,40,400);

  // lane dashed lines
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 4;
  ctx.setLineDash([20,15]);
  ctx.beginPath();
  ctx.moveTo(150,0);
  ctx.lineTo(150,400);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCar(){
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(carX,340,20,40);
  // windshield
  ctx.fillStyle = '#93c5fd';
  ctx.fillRect(carX+3,345,14,10);
}

function drawObstacles(){
  ctx.fillStyle = '#facc15';
  obstacles.forEach(o=>{
    ctx.fillRect(o.x,o.y,20,40);
    o.y += 4;

    // respawn
    if(o.y > 420){
      o.y = -60;
      o.x = 60 + Math.floor(Math.random()*160);
      score++;
    }

    // collision
    if(carX < o.x+20 && carX+20 > o.x && 340 < o.y+40 && 380 > o.y){
      alert('💥 Game Over! Score: '+score);
      document.location.reload();
    }
  });
}

function drawScore(){
  ctx.fillStyle='white';
  ctx.font='16px Arial';
  ctx.fillText('Score: '+score, 10, 20);
}

function update(){
  if(keys.left && carX > 40) carX -= speed;
  if(keys.right && carX < 240) carX += speed;
}

function gameLoop(){
  ctx.clearRect(0,0,300,400);
  drawRoad();
  update();
  drawCar();
  drawObstacles();
  drawScore();
  requestAnimationFrame(gameLoop);
}
gameLoop();

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') keys.left=true;
  if(e.key==='ArrowRight') keys.right=true;
});

document.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft') keys.left=false;
  if(e.key==='ArrowRight') keys.right=false;
});

// Mobile Touch Controls
let touchStartX = null;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});

document.addEventListener('touchmove', e => {
  if(!touchStartX) return;
  let touchEndX = e.touches[0].clientX;

  if(touchEndX < touchStartX){
    keys.left = true;
    keys.right = false;
  } else {
    keys.right = true;
    keys.left = false;
  }
});

document.addEventListener('touchend', () => {
  keys.left = false;
  keys.right = false;
  touchStartX = null;
});

// SNAKE
const sCanvas = document.getElementById('snakeGame');
const sctx = sCanvas.getContext('2d');
let snake=[{x:150,y:150}],dx=10,dy=0,food={x:50,y:50};
function snakeDraw(){
 sctx.clearRect(0,0,300,300);
 snake.forEach(s=>sctx.fillRect(s.x,s.y,10,10));
 sctx.fillStyle='red';
 sctx.fillRect(food.x,food.y,10,10);
 sctx.fillStyle='white';
 let head={x:snake[0].x+dx,y:snake[0].y+dy};
 snake.unshift(head);
 if(head.x==food.x&&head.y==food.y){
  food={x:Math.random()*300,y:Math.random()*300};
 }else snake.pop();
}
setInterval(snakeDraw,100);
</script>

</body>
</html>
