<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gaming Website</title>
<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  overflow:hidden;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
  background-size: 400% 400%;
  animation: bg 10s infinite;
}
@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
button{padding:10px;margin:10px;cursor:pointer}
canvas{background:black}
.hidden{display:none}
</style>
</head>
<body>

<h1>🎮 Gaming Website</h1>
<button onclick="show('car')">🚗 Car Racing</button>
<button onclick="show('snake')">🐍 Snake</button>

<div id="car" class="hidden">
<h2>Car Racing Game</h2>
<canvas id="carGame" width="300" height="400"></canvas>
</div>

<div id="snake" class="hidden">
<h2>Snake Game</h2>
<canvas id="snakeGame" width="300" height="300"></canvas>
</div>

<script>
function show(g){
 document.getElementById('car').classList.add('hidden');
 document.getElementById('snake').classList.add('hidden');
 document.getElementById(g).classList.remove('hidden');
}

// CAR GAME
const c = document.getElementById('carGame');
const ctx = c.getContext('2d');
let carX = 140;
let obstacles = [{x:100,y:0}];

function drawCar(){
 ctx.fillStyle='red';
 ctx.fillRect(carX,350,20,40);
}

function drawObstacles(){
 ctx.fillStyle='white';
 obstacles.forEach(o=>{
  ctx.fillRect(o.x,o.y,20,20);
  o.y+=5;
 });
}

function gameLoop(){
 ctx.clearRect(0,0,300,400);
 drawCar();
 drawObstacles();
 requestAnimationFrame(gameLoop);
}
gameLoop();

document.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft') carX-=20;
 if(e.key==='ArrowRight') carX+=20;
});

// SNAKE
const sCanvas = document.getElementById('snakeGame');
const sctx = sCanvas.getContext('2d');
let snake=[{x:150,y:150}],dx=10,dy=0,food={x:50,y:50};
function snakeDraw(){
 sctx.clearRect(0,0,300,300);
 snake.forEach(s=>sctx.fillRect(s.x,s.y,10,10));
 sctx.fillStyle='red';
 sctx.fillRect(food.x,food.y,10,10);
 sctx.fillStyle='white';
 let head={x:snake[0].x+dx,y:snake[0].y+dy};
 snake.unshift(head);
 if(head.x==food.x&&head.y==food.y){
  food={x:Math.random()*300,y:Math.random()*300};
 }else snake.pop();
}
setInterval(snakeDraw,100);
</script>

</body>
</html>
